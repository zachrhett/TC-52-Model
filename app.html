const names=Object.keys(data);
function topHome(){return `<div class="top"><div class="status"><span>10:30 AM</span><span>◥ ▲ ▌</span></div><div class="bar"><button class="hamb" onclick="openMenu()">☰</button><div class="title"><h1>F.R.I.E.N.D.</h1><small>FULL RETAIL INTEGRATION<br>ENGAGED NETWORK DYNAMICS</small></div><div class="bell">♧<span class="badge">7</span></div></div><div class="store"><img class="logo" src="${logo}"><div><h2>Store #129</h2><p>1000 Vista Pkwy</p><p>Erie, CO 80516</p></div><div class="open">Open 6:00 AM - 10:00 PM<br>Store Status<br><span class="dot"></span>Open</div></div></div><div class="date"><span>▣ Today is May 12, 2024</span><span>↻ Last Updated: 9:45 AM</span></div>`}
function topDetail(k){let d=data[k];return `<div class="top"><div class="status"><span>10:30 AM</span><span>◥ ▲ ▌</span></div><div class="bar head"><button class="back" onclick="openScreen('home')">‹</button><div class="icon ${d[3]}">${d[0]}</div><div><h2>${d[1]}</h2><p>${d[2]}</p></div></div></div><div class="date"><span>▣ Today is May 12, 2024</span><span>↻ Last Updated: 9:45 AM</span></div>`}
function footer(){return `<div class="footer"><span>▢ Data Secure</span><span>F.R.I.E.N.D. v2.4.1</span></div>`}
function home(){return topHome()+`<div class="content"><div class="priority"><b>1</b><span>PRIORITY<br>FRIEND Guided Mission</span></div>${names.map(k=>{let d=data[k];return `<div class="card"><button class="tab" onclick="openScreen('${k}')"><div class="icon ${d[3]}">${d[0]}</div><div><h3 style="color:${color(d[3])}">${d[1]}</h3><p>${d[2]}</p></div><div class="chev">›</div></button></div>`}).join('')}<div class="section">GUIDED PROMPTS</div><div class="promptGrid"><button class="prompt" onclick="openScreen('associate')">Associate</button><button class="prompt" onclick="openScreen('leader')">Leader</button><button class="prompt" onclick="openScreen('training')">Training</button><button class="prompt" onclick="openScreen('alerts')">Alerts</button><button class="prompt" onclick="openScreen('mission')">Mission</button></div></div>`+footer()}
function color(c){return {blue:'#003dad',red:'#e51e29',green:'#108d36',orange:'#f47b00',purple:'#5137b7',teal:'#09928c',yellow:'#ff9200'}[c]}
function detail(k){let d=data[k],m=d[4];return topDetail(k)+`<div class="content"><div class="section">${d[1]} SUMMARY</div><div class="grid">${[0,2,4,6].map(i=>`<div class="card metric"><div class="label">${m[i]}</div><div class="num">${m[i+1]}</div><div class="${i%4==0?'up':'down'}">${i%4==0?'▲':'▼'} vs Yesterday</div></div>`).join('')}</div><div class="card"><div class="rows"><div class="section">DEPARTMENT ${d[1]}</div>${deptRows(k)}</div></div><div class="card tasks"><div class="section" style="padding:14px;margin:0">${d[1]} TASKS</div>${task('Review '+d[1].toLowerCase()+' exception for Meat Dept.','Overdue')}${task('Complete guided mission for Deli Leader','Due Today','gold')}</div><div class="promptGrid"><button class="prompt" onclick="openScreen('mission')">Start Mission</button><button class="prompt" onclick="openScreen('leader')">Leader Options</button></div></div>`+footer()}
function deptRows(k=''){let noFront=['inventory','shrink','sales','food'].includes(k);let depts=noFront?['Meat','Produce','Deli','Bakery','Grocery']:['Meat','Produce','Deli','Bakery','Grocery','Front End'];let vals=noFront?['94%','97%','89%','96%','93%']:['94%','97%','89%','96%','93%','98%'];let cls=noFront?['red','green','orange','purple','blue']:['red','green','orange','purple','blue','frontyellow'];return depts.map((x,i)=>`<div class="row"><span>${x}</span><div class="track"><div class="fill ${cls[i]}" style="width:${parseInt(vals[i])}%"></div></div><b>${vals[i]}</b><span class="${i==2?'up':'down'}">${i==2?'▲':'▼'}</span></div>`).join('')}
function task(t,p,c=''){return `<div class="task"><div class="box"></div><div><b>${t}</b><br><small>Assigned to: Store / Department Leader</small></div><span class="pill ${c}">${p}</span><span class="chev">›</span></div>`}
function leaderHub(){return topDetail('tasks')+`<div class="content"><div class="section">SELECT LEADERSHIP LEVEL</div><div class="card"><button class="tab" onclick="openScreen('deptLeader')"><div class="icon orange">J</div><div><h3 style="color:#f47b00">Department Leader — Jamie</h3><p>Department coaching, team support, Fresh Start, temperatures, production and replenishment.</p></div><div class="chev">›</div></button></div><div class="card"><button class="tab" onclick="openScreen('storeLeader')"><div class="icon purple">J</div><div><h3 style="color:#5137b7">Store Leader — Joey</h3><p>Store composite, department ranking, escalations, risk and guided store missions.</p></div><div class="chev">›</div></button></div><div class="priority"><b>1</b><span>LEADER PRIORITY</span></div><div class="card metric"><div class="section">Why Leader Mode Matters</div><p>The associate screen tells people what to do. The department leader screen shows who needs help. The store leader screen shows where the business is at risk.</p></div></div>`+footer()}
function deptLeader(){return topDetail('food')+`<div class="content"><div class="section">JAMIE — DEPARTMENT LEADER</div><div class="priority"><b>RED</b><span>Support Alex with Hot Holding Temperatures</span></div><div class="grid"><div class="card metric"><div class="label">Fresh Start</div><div class="num">98%</div><div class="up">▲ On Track</div></div><div class="card metric"><div class="label">Temp Compliance</div><div class="num">96%</div><div class="up">▲ Strong</div></div><div class="card metric"><div class="label">Production</div><div class="num">84%</div><div class="down">▼ Needs Support</div></div><div class="card metric"><div class="label">Replenishment</div><div class="num">91%</div><div class="up">▲ Improving</div></div></div><div class="card tasks"><div class="section" style="padding:14px;margin:0">DEPARTMENT ACTIONS</div>${task('Help Alex complete hot holding temperature process','Start Now','gold')}${task('Review Deli production gap before lunch rush','Due Today','gold')}${task('Confirm replenishment for high movement items','On Track','gold')}</div><div class="promptGrid"><button class="prompt" onclick="openScreen('mission')">Open Department Mission</button><button class="prompt" onclick="openScreen('training')">Training Opportunities</button><button class="prompt" onclick="openScreen('food')">Food Safety</button><button class="prompt" onclick="openScreen('leader')">Back to Leader</button></div></div>`+footer()}
function storeLeader(){return topDetail('composite')+`<div class="content"><div class="section">JOEY — STORE LEADER</div><div class="priority"><b>RED</b><span>Deli Production Behind Forecast</span></div><div class="grid"><div class="card metric"><div class="label">Store Health</div><div class="num">94%</div><div class="up">▲ Strong</div></div><div class="card metric"><div class="label">Departments At Risk</div><div class="num">2</div><div class="down">▼ Needs Attention</div></div><div class="card metric"><div class="label">Training Complete</div><div class="num">97%</div><div class="up">▲ On Track</div></div><div class="card metric"><div class="label">Mission Complete</div><div class="num">91%</div><div class="up">▲ Improving</div></div></div><div class="card"><div class="rows"><div class="section">DEPARTMENT RANKING</div>${deptRows()}</div></div><div class="card tasks"><div class="section" style="padding:14px;margin:0">STORE ACTIONS</div>${task('Proceed to Deli and support Jamie with production execution','Start Now','gold')}${task('Review overtime exposure in Meat Department','Overdue')}${task('Check Front End service readiness before peak','Due Today','gold')}</div><div class="promptGrid"><button class="prompt" onclick="openScreen('mission')">Launch Store Mission</button><button class="prompt" onclick="openScreen('alerts')">Open Escalations</button><button class="prompt" onclick="openScreen('composite')">Store Health</button><button class="prompt" onclick="openScreen('leader')">Back to Leader</button></div></div>`+footer()}
function special(kind){let copy={training:['TRAINING','Fresh Start, food safety, labor standards and guided learning.'],alerts:['ALERTS','Critical priorities, overdue tasks, temp misses and service needs.'],mission:['FRIEND GUIDED MISSION','Priority 1: Support Alex with hot holding temperatures while Jamie reviews completion and Joey monitors store impact.']}[kind];return topDetail('tasks')+`<div class="content"><div class="priority"><b>1</b><span>${copy[0]}</span></div><div class="card metric"><div class="section">${copy[0]}</div><p>${copy[1]}</p></div><div class="promptGrid"><button class="prompt" onclick="openScreen('labor')">Labor</button><button class="prompt" onclick="openScreen('food')">Food Safety</button><button class="prompt" onclick="openScreen('tasks')">Tasks</button><button class="prompt" onclick="openScreen('home')">Home</button></div></div>`+footer()}

function associateWelcome(){return topDetail('associate')+`<div class="content"><div class="welcome">Welcome Alex!</div><div class="card metric"><div class="section">Fresh Start Required</div><p>Good morning Alex. Please complete your Fresh Start and move to the next mission.</p><p><b>Status:</b> <span class="redText">Incomplete</span></p><button class="bigBtn" onclick="openScreen('associateMission')">Complete Fresh Start</button></div><div class="card metric"><div class="section">F.R.I.E.N.D. Support</div><p class="miniNote">F.R.I.E.N.D. will guide you screen by screen so every step is clear, accurate, and visible to your leader.</p></div></div>`+footer()}
function associateMission(){return topDetail('associate')+`<div class="content"><div class="welcome">Great Work Alex!</div><div class="card metric"><div class="section">Fresh Start Complete</div><p><b>Status:</b> <span class="greenText">Complete</span></p><div class="priority"><b>1</b><span>Hot Holding Temperatures</span></div><p><b>Estimated Time:</b> 4 Minutes</p><p class="miniNote">Why it matters: Food safety, customer protection, compliance, and leader visibility.</p><button class="bigBtn" onclick="openScreen('temp1')">Next Mission</button></div></div>`+footer()}
function stepShell(step,title,body,next){return topDetail('associate')+`<div class="content"><div class="section">STEP ${step} OF 5</div><div class="card metric"><div class="missionTitle">${title}</div>${body}<div class="progress"><div style="width:${step*20}%"></div></div><p class="miniNote">${step*20}% Complete</p></div></div><button class="nextBtn" onclick="openScreen('${next}')">${step<5?'Next ➜':'Done'}</button>`+footer()}
function temp1(){return stepShell(1,'Select Mission',`<p class="miniNote">Choose the mission you need to complete.</p><div class="option"><span class="radio on"></span><b>Hot Holding Temps</b></div><div class="option"><span class="radio"></span>Cold Case Temps</div><div class="option"><span class="radio"></span>Cooler Temps</div><div class="option"><span class="radio"></span>Freezer Temps</div>`,'temp2')}
function temp2(){return stepShell(2,'Select Equipment',`<p class="miniNote">Select the correct equipment for accurate results.</p><div class="option"><span class="radio on"></span><b>Probe Thermometer</b></div><div class="option"><span class="radio"></span>Infrared Thermometer</div><div class="option"><span class="radio"></span>Bluetooth Probe</div>`,'temp3')}
function temp3(){return stepShell(3,'Take Temperature',`<p class="miniNote">Insert probe and take reading.</p><div class="tempBox"><small>PRODUCT TEMP</small><br><b>165°F</b><br><span class="greenText">Target: 135°F or above</span></div><div class="checkBig">✓</div><p class="greenText" style="text-align:center">IN RANGE</p>`,'temp4')}
function temp4(){return stepShell(4,'Record Location',`<p class="miniNote">Select the exact location for traceability and accountability.</p><div class="option"><span class="radio on"></span><b>Deli Hot Case</b></div><div class="option"><span class="radio"></span>Chicken Station</div><div class="option"><span class="radio"></span>Soup Bar</div><div class="option"><span class="radio"></span>Rotisserie Area</div><div class="option"><span class="radio"></span>Grab & Go Case</div>`,'temp5')}
function temp5(){return stepShell(5,'Mission Complete',`<div class="checkBig">✓</div><p class="greenText" style="text-align:center">Hot Holding Temps Completed Successfully</p><div class="option"><span>▣</span>Data Recorded</div><div class="option"><span>▣</span>Dashboard Updated</div><div class="option"><span>▣</span>Leader Notified</div>`,'associateDone')}
function associateDone(){return topDetail('associate')+`<div class="content"><div class="welcome">Mission Complete</div><div class="card metric"><div class="checkBig">✓</div><p class="greenText" style="text-align:center">Great work Alex!</p><p>Jamie now has real-time visibility and Joey's store dashboard has been updated.</p><div class="grid"><div class="card metric"><div class="label">Compliance</div><div class="num">100%</div><div class="up">▲ Complete</div></div><div class="card metric"><div class="label">Time</div><div class="num">3:42</div><div class="up">▲ On Track</div></div></div><button class="bigBtn" onclick="openScreen('home')">Return Home</button></div></div>`+footer()}

function openScreen(k){closeMenu();document.getElementById('app').innerHTML=k==='home'?home():k==='associate'?associateWelcome():k==='associateMission'?associateMission():k==='temp1'?temp1():k==='temp2'?temp2():k==='temp3'?temp3():k==='temp4'?temp4():k==='temp5'?temp5():k==='associateDone'?associateDone():k==='leader'?leaderHub():k==='deptLeader'?deptLeader():k==='storeLeader'?storeLeader():data[k]?detail(k):special(k)}
function openMenu(){document.getElementById('nav').style.display='block'}function closeMenu(){document.getElementById('nav').style.display='none'}
openScreen('home');
</script>
</body>
</html>
